<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDA Simulator</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body data-theme="dark" data-mobile-panel="simulate">
  <header class="topbar">
    <div class="brand">
      <svg class="brand-logo" width="24" height="24" viewBox="0 0 24 24" aria-hidden="true">
        <defs>
          <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#4f8ef7"></stop>
            <stop offset="100%" stop-color="#a78bfa"></stop>
          </linearGradient>
        </defs>
        <rect x="3" y="4" width="18" height="4" rx="2" fill="none" stroke="url(#logoGrad)" stroke-width="1.6"></rect>
        <rect x="3" y="10" width="18" height="4" rx="2" fill="none" stroke="url(#logoGrad)" stroke-width="1.6"></rect>
        <rect x="3" y="16" width="18" height="4" rx="2" fill="none" stroke="url(#logoGrad)" stroke-width="1.6"></rect>
      </svg>
      <strong class="brand-title">PDA Simulator</strong>
      <span class="badge">v1.0</span>
    </div>

    <label class="preset-pill">
      <span class="preset-pill-icon" aria-hidden="true">⚡</span>
      <select id="presetSelect" aria-label="Load preset PDA"></select>
    </label>

    <div class="top-actions">
      <button id="importBtn" type="button" class="btn ghost btn-icon-label" title="Import JSON">
        <span class="btn-ic" aria-hidden="true">↓</span> Import
      </button>
      <button id="exportBtn" type="button" class="btn ghost btn-icon-label" title="Export JSON">
        <span class="btn-ic" aria-hidden="true">↑</span> Export
      </button>
      <button id="themeBtn" type="button" class="btn ghost theme-toggle" title="Toggle light / dark mode">☀</button>
      <input id="importFileInput" type="file" accept="application/json" hidden>
    </div>
  </header>

  <nav class="mobile-tabs" aria-label="Switch panel">
    <button type="button" class="mobile-tab" data-panel="define">Definition</button>
    <button type="button" class="mobile-tab is-active" data-panel="simulate">Simulate</button>
    <button type="button" class="mobile-tab" data-panel="stack">Stack</button>
  </nav>

  <main class="app-grid">
    <aside class="card left-panel" data-panel="define">
      <div class="section-title"><span class="accent blue"></span>States</div>
      <button id="addStateBtn" type="button" class="btn dashed full add-row-btn">+ Add State</button>
      <div id="statesList" class="states-list"></div>

      <hr class="panel-divider">

      <div class="section-title">
        <span class="accent green"></span>Transitions
        <span id="transitionCount" class="count-pill">0</span>
      </div>
      <button id="addTransitionBtn" type="button" class="btn dashed full add-row-btn">+ Add Transition</button>
      <div id="transitionsList" class="transitions-list"></div>
    </aside>

    <section class="card center-panel" data-panel="simulate">
      <div class="input-card">
        <div class="input-card-label">Input string</div>
        <div id="tokenRow" class="token-row" aria-live="polite"></div>
        <div class="current-char-hint" id="currentCharHint" aria-hidden="true"></div>
        <div id="positionLabel" class="position-label">Position 0 of 0</div>
        <input id="inputString" class="input-main" type="text" placeholder="Type input string..." autocomplete="off" spellcheck="false">
      </div>

      <div class="controls-row">
        <button id="resetBtn" type="button" class="btn text">⏮ Reset <kbd>R</kbd></button>
        <button id="backBtn" type="button" class="btn outline">◀ Back</button>
        <button id="stepBtn" type="button" class="btn outline">▶ Step <kbd>Space</kbd></button>
        <button id="runBtn" type="button" class="btn primary">▶▶ Run <kbd>Enter</kbd></button>
        <label class="speed-wrap">Speed <input id="speedSlider" type="range" min="100" max="1500" step="50" value="1100"><span id="speedValue">500ms</span></label>
        <div class="speed-presets">
          <button type="button" class="btn ghost speed-btn" data-speed="250">Fast</button>
          <button type="button" class="btn ghost speed-btn" data-speed="500">Normal</button>
          <button type="button" class="btn ghost speed-btn" data-speed="900">Slow</button>
        </div>
        <label class="toggle-wrap"><span>Auto-run</span> <input id="autoRunToggle" type="checkbox"></label>
      </div>

      <div id="resultBanner" class="result-banner hidden" role="status">
        <span class="result-banner-icon" aria-hidden="true"></span>
        <span class="result-banner-text"></span>
        <button type="button" class="result-dismiss" id="resultDismiss" aria-label="Dismiss">×</button>
      </div>

      <div class="log-head">
        <span>Configuration log</span>
        <span id="stepCounter" class="count-pill">Step 0 / 0</span>
      </div>
      <div class="log-table-wrap">
        <table class="log-table">
          <thead>
            <tr><th>Step</th><th>State</th><th>Remaining</th><th>Stack</th><th>Action</th></tr>
          </thead>
          <tbody id="logBody"></tbody>
        </table>
      </div>
      <div id="branchingTree" class="branching-tree" aria-live="polite"></div>
      <div id="branchingHint" class="branching-hint"></div>
    </section>

    <aside class="card right-panel" data-panel="stack">
      <div class="stack-header">
        <div class="section-title stack-title"><span class="accent blue"></span>Stack</div>
        <div class="stack-icon" id="stackIconAnim" aria-hidden="true">
          <span></span><span></span><span></span>
        </div>
      </div>
      <div id="stackOverflowBanner" class="stack-overflow-banner hidden">Stack depth exceeds 20 — simulation may be misleading.</div>
      <div id="stackView" class="stack-view"></div>
      <div id="depthLabel" class="depth-label">Depth: 0</div>
      <div id="stackWarning" class="stack-warning hidden">Stack growing deep</div>
    </aside>

    <section class="card diagram-panel" data-panel="simulate" aria-label="State diagram panel">
      <div class="diagram-inline">
        <div class="diagram-head">
          <span>State diagram</span>
          <button id="autoLayoutBtn" type="button" class="btn outline btn-auto-layout" title="Reset node positions">▦ Auto-layout</button>
        </div>
        <div class="diagram-wrap">
          <div id="diagramEmpty" class="diagram-empty hidden">Add states in the left panel, or load a preset.</div>
          <svg id="diagram" viewBox="0 0 1200 460" preserveAspectRatio="xMinYMin meet" aria-label="State diagram"></svg>
        </div>
      </div>
    </section>
  </main>

  <div id="toastContainer" class="toast-container"></div>
  <script src="./app.js"></script>
</body>
</html>
